<!doctype html>
<html>
  <body>
    <p id="message">Learning DOM</p>

    <button onclick="hideText()">Hide</button>

    <button onclick="showText()">Show</button>

    <script>
      function hideText() {
        document.getElementById("message").style.display = "none";
      }

      function showText() {
        document.getElementById("message").style.display = "block";
      }
    </script>
  </body>
</html>
